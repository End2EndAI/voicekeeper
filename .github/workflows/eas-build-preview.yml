name: EAS Build Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (preview)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        id: build
        run: |
          eas build \
            --profile preview \
            --platform android \
            --non-interactive \
            --json \
            --no-wait \
            | tee build-output.json
          echo "build_id=$(jq -r '.[0].id' build-output.json)" >> $GITHUB_OUTPUT

      - name: Post build link to commit
        uses: actions/github-script@v7
        with:
          script: |
            const buildId = '${{ steps.build.outputs.build_id }}';
            const buildUrl = `https://expo.dev/accounts/end2endai/projects/voicekeeper/builds/${buildId}`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '## 📦 Android Preview Build Started',
                '',
                `**Build:** [View on Expo](${buildUrl})`,
                '',
                'The APK will be ready to download in ~15 minutes.',
              ].join('\n'),
            });
