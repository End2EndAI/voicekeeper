name: EAS Update

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish preview update (PR)
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          eas update \
            --branch pr-${{ github.event.pull_request.number }} \
            --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" \
            --non-interactive \
            --json > eas-update-output.json
          echo "update_id=$(jq -r '.[0].id' eas-update-output.json)" >> $GITHUB_OUTPUT
          echo "group_id=$(jq -r '.[0].group' eas-update-output.json)" >> $GITHUB_OUTPUT

      - name: Comment PR with update link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const updateId = '${{ steps.preview.outputs.update_id }}';
            const groupId = '${{ steps.preview.outputs.group_id }}';
            const prNumber = context.payload.pull_request.number;
            const projectId = '5ac0d3a9-c322-4305-b745-fc12b582b3ff';
            const qrUrl = `https://qr.expo.dev/eas-update?updateId=${updateId}&appScheme=voicekeeper&host=u.expo.dev`;
            const updateUrl = `https://expo.dev/accounts/end2endai/projects/voicekeeper/updates/${groupId}`;

            const body = [
              '## 📱 Preview Update Ready',
              '',
              `**Branch:** \`pr-${prNumber}\``,
              `**Update:** [View on Expo](${updateUrl})`,
              '',
              '### Scan to open in Expo Go',
              `![QR Code](${qrUrl})`,
              '',
              '> Open the app on your device and scan this QR code, or open the Expo Go app and navigate to the update.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Update Ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Publish production update (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          eas update \
            --branch main \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
