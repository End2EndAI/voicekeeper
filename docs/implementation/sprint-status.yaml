project: voicekeeper
total_sprints: 4
current_sprint: 1

sprints:
  - id: 1
    name: "Foundation: Project Setup + Authentication"
    goal: "Scaffold Expo project, configure Supabase backend, set up database schema, and implement user authentication with session management."
    status: not_started
    epics:
      - E1
      - E2
    stories:
      - id: E1-S1
        title: "Initialize Expo Project with TypeScript"
        epic: E1
        status: not_started
        priority: must_have
        points: 3
        dependencies: []
        acceptance_criteria:
          - "App launches on web, iOS, and Android with placeholder home screen"
          - "Project structure matches architecture spec (app/, components/, contexts/, services/, types/, constants/, utils/)"
          - "TypeScript strict mode enabled"
          - "Core dependencies installed (@supabase/supabase-js, expo-av, expo-secure-store)"

      - id: E1-S2
        title: "Configure Supabase Backend"
        epic: E1
        status: not_started
        priority: must_have
        points: 3
        dependencies:
          - E1-S1
        acceptance_criteria:
          - "Supabase client connects successfully from the app"
          - "notes table created with RLS enabled"
          - "user_preferences table created with RLS enabled"
          - "Database triggers for updated_at and new user preferences work"
          - "recordings storage bucket created with private access policies"
          - "Environment variables configured in .env.local"

      - id: E1-S3
        title: "Deploy Edge Function Skeleton"
        epic: E1
        status: not_started
        priority: must_have
        points: 2
        dependencies:
          - E1-S2
        acceptance_criteria:
          - "process-recording Edge Function deployed to Supabase"
          - "OpenAI API key stored as Supabase secret"
          - "Function validates request (requires audio file and format_type)"
          - "Function returns mock response for authenticated requests"

      - id: E2-S1
        title: "Implement AuthContext and Session Management"
        epic: E2
        status: not_started
        priority: must_have
        points: 3
        dependencies:
          - E1-S2
        acceptance_criteria:
          - "AuthContext provides user, session, and loading state globally"
          - "Auth state change listener updates context on login/logout"
          - "Sessions persist across app restarts"
          - "Auth guard redirects unauthenticated users to login screen"

      - id: E2-S2
        title: "Build Login/Signup Screen"
        epic: E2
        status: not_started
        priority: must_have
        points: 3
        dependencies:
          - E2-S1
        acceptance_criteria:
          - "User can sign up with email and password"
          - "User can sign in with email and password"
          - "Toggle between Sign Up and Sign In modes"
          - "Validation errors displayed clearly"
          - "Successful auth navigates to Home screen"

      - id: E2-S3
        title: "Implement Logout"
        epic: E2
        status: not_started
        priority: must_have
        points: 1
        dependencies:
          - E2-S2
        acceptance_criteria:
          - "Logout button clears session and navigates to login"
          - "Local state is cleared on logout"

